name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: make all

      - name: Verify static linking
        run: |
          file bin/pause-linux-amd64 | grep -q 'statically linked'
          file bin/pause-linux-arm64 | grep -q 'statically linked'

      - name: Generate checksums
        run: cd bin && sha256sum pause-linux-amd64 pause-linux-arm64 > sha256sums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            bin/pause-linux-amd64 \
            bin/pause-linux-arm64 \
            bin/sha256sums.txt
